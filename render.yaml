services:
  - type: web
    name: finanzas-app-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-app-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: BILLING_PROVIDER
        value: stub
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: finanzas-app-db
    plan: free
