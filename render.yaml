services:
  - type: web
    name: finanzas-app-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-app-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://tu-dominio.com
      - key: BILLING_PROVIDER
        value: polar
      - key: SECRET_KEY
        generateValue: true
      - key: POLAR_CHECKOUT_URL
        sync: false
      - key: POLAR_API_BASE_URL
        value: https://api.polar.sh
      - key: POLAR_ACCESS_TOKEN
        sync: false
      - key: POLAR_ORGANIZATION_ID
        sync: false
      - key: POLAR_PRODUCT_ID
        sync: false
      - key: POLAR_SUCCESS_URL
        sync: false
      - key: POLAR_RETURN_URL
        sync: false
      - key: POLAR_WEBHOOK_SECRET
        sync: false

databases:
  - name: finanzas-app-db
    plan: free
